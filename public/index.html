<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redis 文章专辑跳转页</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f1ea;
        --card: #fffdf8;
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #0f766e;
        --accent-hover: #115e59;
        --border: #d6d3d1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "SF Pro Text", "PingFang SC", "Noto Sans SC", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(15, 118, 110, 0.12), transparent 32%),
          linear-gradient(180deg, #f8f7f3 0%, var(--bg) 100%);
      }

      main {
        width: min(560px, 100%);
        padding: 32px;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: var(--card);
        box-shadow: 0 16px 50px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.05;
      }

      p {
        margin: 0 0 16px;
        line-height: 1.7;
        color: var(--muted);
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 18px;
        border-radius: 999px;
        color: #fff;
        text-decoration: none;
        background: var(--accent);
        transition: background-color 160ms ease;
      }

      a:hover {
        background: var(--accent-hover);
      }

      code {
        padding: 2px 6px;
        border-radius: 6px;
        background: rgba(15, 118, 110, 0.08);
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Redis 文章专辑跳转页</h1>
      <p>
        这个 Cloudflare Pages 页面提供一个短路径 <code>/redis</code>，访问后会跳转到目标微信公众号文章专辑链接。
      </p>
      <a href="/redis">打开 /redis</a>
    </main>
  </body>
</html>
